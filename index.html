<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ByteForge</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── EFEITO DE FOGO AMBIENTE ── -->
<div class="fire-glow"></div>
<div class="fire-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div id="app">

    <!-- ══════════════════════════════════════
         HEADER — mascote ByteForge + info
         ══════════════════════════════════════ -->
    <div id="header">

        <!--
            MASCOTE: ByteForge
        -->
        <div id="mascote-wrap" title="Clique em mim!">
        <!--
            MASCOTE: ByteForge — robô forjador com capacete, martelo e bigorna
            viewBox: 0 0 80 90
        -->
        <svg id="byteforge" viewBox="0 0 95 95" width="100" height="120" xmlns="http://www.w3.org/2000/svg" aria-label="ByteForge mascote forjador">

            <!-- ── CHAMAS de fundo (decorativas) ── -->
            <ellipse class="bot-fire-shadow" cx="40" cy="88" rx="22" ry="4" fill="rgba(255,100,0,.18)"/>

            <!-- ── CORPO DO ROBÔ (Atrás da bigorna) ── -->
            <g id="bot-body">
                <!-- pescoço -->
                <rect x="34" y="56" width="12" height="8" rx="2" fill="#2a2218" stroke="#5c4a2a" stroke-width="1.5"/>
                <!-- ombros reforçados e mecânicos -->
                <path d="M 16 64 Q 40 56 64 64 L 60 74 Q 40 78 20 74 Z" fill="#3a2e22" stroke="#ff8c42" stroke-width="1.5"/>
                <!-- tronco descendo até a base (ficará parcialmente escondido pela bigorna) -->
                <path d="M 22 72 L 58 72 L 52 92 L 28 92 Z" fill="#2e2418" stroke="#5c4a2a" stroke-width="1.5"/>
            </g>

            <!-- ── BIGORNA (Aço Escuro Clássico) ── -->
            <!-- base -->
            <rect x="14" y="82" width="52" height="6" rx="2" fill="#141518"/>
            <!-- tronco -->
            <rect x="26" y="77" width="28" height="5" rx="1" fill="#22242a"/>
            <!-- tampo -->
            <rect x="12" y="72" width="56" height="5" rx="2" fill="#343740"/>
            <!-- ponta da bigorna (formato tradicional à direita) -->
            <polygon points="68,72 78,74 68,77" fill="#343740" />
            <!-- brilho metálico no tampo -->
            <rect x="14" y="72" width="52" height="1.5" fill="rgba(255,255,255,.15)"/>

            <!-- ── METAL QUENTE (sendo forjado) ── -->
            <path class="hot-metal" d="M 28 72 L 40 72 L 38 69 L 30 69 Z" fill="#ffcc44" />

            <!-- ── BRAÇO ESQUERDO (apoiado na bigorna) ── -->
            <rect x="11" y="60" width="10" height="18" rx="4" fill="#3a2e22" stroke="rgba(255,140,42,.4)" stroke-width="1.2"
                  transform="rotate(15 16 69)"/>
            <circle cx="13" cy="74" r="4.5" fill="#4a3820" stroke="rgba(255,150,50,.4)" stroke-width="1"/>

            <!-- ── CABEÇA ── -->
            <!-- capacete / base da cabeça -->
            <rect x="14" y="22" width="52" height="36" rx="16" fill="#2c3038" stroke="#14161a" stroke-width="1.5"/>
            <!-- viseira interna -->
            <rect x="18" y="26" width="44" height="28" rx="12" fill="#0f1115"/>
            <!-- brilho laranja da viseira -->
            <rect x="18" y="26" width="44" height="5" rx="6" fill="rgba(255,140,42,.15)"/>

            <!-- ── CAPACETE NÓRDICO RÚSTICO ── -->
            <!-- chifre esquerdo -->
            <path d="M 18 18 Q 4 14 6 2 Q 14 10 24 16 Z" fill="#d4c9b8" stroke="#7a7063" stroke-width="1.5"/>
            <!-- chifre direito -->
            <path d="M 62 18 Q 76 14 74 2 Q 66 10 56 16 Z" fill="#d4c9b8" stroke="#7a7063" stroke-width="1.5"/>
            
            <!-- domo central de ferro escuro -->
            <path d="M 16 19 C 16 2 64 2 64 19 Z" fill="#464b54" stroke="#1d2126" stroke-width="1.5"/>
            <!-- faixa de bronze envelhecido na base do capacete -->
            <rect x="12" y="17" width="56" height="7" rx="3" fill="#8c6832" stroke="#4a3517" stroke-width="1.5"/>
            <!-- rebites na faixa -->
            <circle cx="20" cy="20.5" r="1.2" fill="#e0c294"/>
            <circle cx="40" cy="20.5" r="1.2" fill="#e0c294"/>
            <circle cx="60" cy="20.5" r="1.2" fill="#e0c294"/>

            <!-- ── OLHOS (Vivos e Expressivos com Reflexo) ── -->
            <!-- Olho esquerdo -->
            <g class="eye">
                <ellipse cx="29" cy="36" rx="9" ry="7" fill="#ffca7a" stroke="#8c4a16" stroke-width="1.5" transform="rotate(-10 29 36)"/>
                <!-- pupila (agora isolada para seguir o mouse) -->
                <g id="eye-pupil-left">
                    <circle cx="29" cy="36" r="4" fill="#3a1f04"/>
                    <!-- reflexo branco que dá vida -->
                    <circle cx="30.5" cy="34.5" r="1.5" fill="#ffffff"/>
                </g>
            </g>

            <!-- Olho direito -->
            <g class="eye delay">
                <ellipse cx="51" cy="36" rx="9" ry="7" fill="#ffca7a" stroke="#8c4a16" stroke-width="1.5" transform="rotate(10 51 36)"/>
                <!-- pupila (agora isolada para seguir o mouse) -->
                <g id="eye-pupil-right">
                    <circle cx="51" cy="36" r="4" fill="#3a1f04"/>
                    <!-- reflexo branco que dá vida -->
                    <circle cx="52.5" cy="34.5" r="1.5" fill="#ffffff"/>
                </g>
            </g>

            <!-- ── BOCA: símbolo forja ── -->
            <text id="bot-mouth" x="40" y="50" text-anchor="middle" fill="#ff8c42"
                  font-family="'Consolas', monospace" font-size="9" font-weight="bold">&#x2692;</text>

            <!-- ── BRAÇO DIREITO (agora no final para ficar em 1º plano sobre a cabeça) ── -->
            <g id="hammer-arm">
            <!-- braço (cores mais claras e contorno vibrante) -->
            <rect x="60" y="44" width="9" height="20" rx="4" fill="#363b45" stroke="#ff8c42" stroke-width="1.5"
                  transform="rotate(-30 64 54)"/>
            <!-- mão -->
            <circle cx="68" cy="38" r="6" fill="#5c4033" stroke="#ff8c42" stroke-width="1.2"/>

            <!-- MARTELO (Estilo Mjölnir) -->
            <!-- cabo do martelo -->
            <line x1="68" y1="36" x2="74" y2="16" stroke="#4a2e15" stroke-width="5" stroke-linecap="round"/>
            <line x1="68" y1="36" x2="74" y2="16" stroke="#8b5a2b" stroke-width="5" stroke-dasharray="2 4"/>
            
            <g transform="rotate(-15 75 16)">
                <!-- extremidades do martelo -->
                <rect x="58" y="11" width="4" height="12" rx="1" fill="#3b4047" stroke="#8ca6c2" stroke-width="1"/>
                <rect x="86" y="11" width="4" height="12" rx="1" fill="#3b4047" stroke="#8ca6c2" stroke-width="1"/>
                <!-- bloco principal -->
                <rect x="61" y="9" width="26" height="16" rx="2" fill="#5a616b" stroke="#8ca6c2" stroke-width="1.5"/>
                <!-- grafismo nórdico brilhante -->
                <path d="M 65 17 L 69 13 L 74 18 L 79 13 L 83 17" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.9"/>
            </g>
            </g>

            <!-- ── CÓDIGOS SAINDO DO IMPACTO NA BIGORNA ── -->
            <text class="spark s1" x="34" y="74" text-anchor="middle" fill="#00ffcc" font-family="monospace" font-size="6" font-weight="bold">&lt;/&gt;</text>
            <text class="spark s2" x="34" y="74" text-anchor="middle" fill="#ffcc44" font-family="monospace" font-size="7" font-weight="bold">{ }</text>
            <text class="spark s3" x="34" y="74" text-anchor="middle" fill="#ff6b1a" font-family="monospace" font-size="5" font-weight="bold">01</text>
            <text class="spark s4" x="34" y="74" text-anchor="middle" fill="#ffee55" font-family="monospace" font-size="6" font-weight="bold">#</text>
        </svg>
        </div>

        <div class="header-info">
            <h1>ByteForge</h1>
            <div class="status">
                <span class="status-dot"></span>
                <span>Forjando código &middot; Online</span>
            </div>
        </div>

        <span id="clock">00:00</span>
        <button id="clear-btn" title="Limpar conversa">&#x232B; Limpar</button>
    </div>

    <!-- ══════════════════════════════════════
         JANELA DE CHAT
         ══════════════════════════════════════ -->
    <div id="chat-window"></div>

    <!-- ══════════════════════════════════════
         ATALHOS — tópicos rápidos
         ══════════════════════════════════════ -->
    <div id="atalhos">
        <span class="atalho" onclick="quickAsk('javascript')">JS</span>
        <span class="atalho" onclick="quickAsk('python')">Python</span>
        <span class="atalho" onclick="quickAsk('git')">Git</span>
        <span class="atalho" onclick="quickAsk('css')">CSS</span>
        <span class="atalho" onclick="quickAsk('api rest')">API/REST</span>
        <span class="atalho" onclick="quickAsk('debug')">Debug</span>
        <span class="atalho" onclick="quickAsk('sql')">SQL</span>
        <span class="atalho" onclick="quickAsk('typescript')">TypeScript</span>
        <span class="atalho" onclick="quickAsk('docker')">Docker</span>
        <span class="atalho" onclick="quickAsk('carreira dev')">Carreira</span>
    </div>

    <!-- balão de pensamento do mascote (position: fixed via JS) -->
    <div id="thought-bubble"></div>

    <!-- ══════════════════════════════════════
         INPUT
         ══════════════════════════════════════ -->
    <div id="input-area">
        <input id="user-input" type="text"
               placeholder="Descreva seu problema ou escolha um atalho..."
               autocomplete="off">
        <button id="send-btn" title="Enviar (Enter)">
            <!-- ícone de avião de papel (send) -->
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>
</div>
<script src="js/brain.js" charset="UTF-8"></script>
<script src="js/ai.js" charset="UTF-8"></script>
<script src="js/script.js" charset="UTF-8"></script>
</body>
</html>
